<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookStayPro | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="login-container">
    <h2>Login to BookStayPro</h2>

    <input type="email" id="email" placeholder="Email" value="keerthi@gmail.com" />
    <input type="password" id="password" placeholder="Password" value="123456" />

    <button onclick="login()">Login</button>

    <p style="text-align:center; margin-top:16px;">
      New user? <a href="home.html" style="color:#d4a017;">Explore Hotels</a>
    </p>

    <div class="error" id="error"></div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("error");

      errorDiv.textContent = "";

      try {
        const response = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.message || "Login failed";
          return;
        }

        alert("Login successful!");
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "home.html";
      } catch (error) {
        console.error("Error logging in:", error);
        errorDiv.textContent = "Error connecting to server.";
      }
    }
  </script>
</body>
</html>
