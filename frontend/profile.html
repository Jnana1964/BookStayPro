<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookStayPro | My Bookings</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <h1>My Booking History</h1>

    <div style="display:flex; gap:12px;">
      <a class="book-btn" href="home.html">Explore Hotels</a>
      <a class="book-btn" href="index.html">Logout</a>
    </div>
  </header>

  <div class="filters">

    <select id="filterCity" onchange="applyFilters()">
      <option value="">Filter by City</option>
    </select>

    <select id="filterStatus" onchange="applyFilters()">
      <option value="">Filter by Status</option>
      <option value="confirmed">Confirmed</option>
      <option value="cancelled">Cancelled</option>
    </select>

  </div>

  <div class="booking-container" id="bookingList"></div>

  <script>
    let bookings = [];

    async function fetchBookings() {
      try {
        const res = await fetch("http://localhost:3000/api/bookings");

        bookings = await res.json();

        populateFilters();

        renderBookings(bookings);

      } catch (error) {
        console.error("Error fetching bookings:", error);
      }
    }

    function populateFilters() {
      const cities =
        [...new Set(bookings.map(b => b.city))];

      const cityDropdown =
        document.getElementById("filterCity");

      cities.forEach(city => {
        const option = document.createElement("option");

        option.value = city;
        option.innerText = city;

        cityDropdown.appendChild(option);
      });
    }

    function renderBookings(data) {

      const list =
        document.getElementById("bookingList");

      if (data.length === 0) {
        list.innerHTML = `
          <p style="text-align:center;">
            No bookings found.
          </p>
        `;
        return;
      }

      list.innerHTML = data.map(booking => `

        <div class="booking-card">

          <div class="booking-details">

            <h3>${booking.hotel_name}</h3>

            <p>📍 ${booking.city}</p>

            <p>👤 ${booking.user_name}</p>

            <p>📧 ${booking.user_email}</p>

            <p>💰 ₹${booking.price}</p>

            <p>📅 ${booking.check_in}</p>

            <p>📅 ${booking.check_out}</p>

            <p>
              Status:
              <strong style="
                color:
                ${booking.status === 'confirmed'
                  ? '#4ade80'
                  : '#ff5c5c'};
              ">
                ${booking.status}
              </strong>
            </p>

            ${
              booking.status === "confirmed"
              ?
              `
              <button
                onclick="cancelBooking(${booking.id})"
                style="margin-top:12px;"
              >
                Cancel Booking
              </button>
              `
              :
              ""
            }

          </div>

        </div>

      `).join("");
    }

    function applyFilters() {

      const selectedCity =
        document.getElementById("filterCity").value;

      const selectedStatus =
        document.getElementById("filterStatus").value;

      let filtered = [...bookings];

      if (selectedCity) {
        filtered =
          filtered.filter(
            booking => booking.city === selectedCity
          );
      }

      if (selectedStatus) {
        filtered =
          filtered.filter(
            booking => booking.status === selectedStatus
          );
      }

      renderBookings(filtered);
    }

    async function cancelBooking(id) {

      const confirmCancel =
        confirm("Are you sure you want to cancel this booking?");

      if (!confirmCancel) return;

      try {

        const res = await fetch(
          `http://localhost:3000/api/bookings/${id}`,
          {
            method: "DELETE"
          }
        );

        const data = await res.json();

        alert(data.message);

        fetchBookings();

      } catch (error) {
        console.error("Cancel booking error:", error);
      }
    }

    fetchBookings();
  </script>

</body>
</html>
