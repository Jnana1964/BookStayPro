<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookStayPro | Explore Hotels</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <h1>BookStayPro</h1>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <a class="book-btn" href="profile.html">My Bookings</a>
      <a class="book-btn" href="hotel.html">Add Hotel</a>
      <a class="book-btn" href="admin.html">Admin</a>
      <a class="book-btn" href="index.html">Logout</a>
    </div>
  </header>

  <section class="hero-box" style="max-width:1000px; margin:30px auto;">
    <h1 style="font-size:58px;">Luxury Hotel Collection</h1>

    <p>
      Discover premium hotels, compare prices, and book your next luxury stay.
    </p>
  </section>

  <div class="filters">
    <input
      type="text"
      id="searchInput"
      placeholder="Search hotels..."
      oninput="applyFilters()"
    />

    <select id="cityFilter" onchange="applyFilters()">
      <option value="">All Cities</option>
    </select>

    <select id="sortFilter" onchange="applyFilters()">
      <option value="">Sort by Price</option>
      <option value="asc">Low to High</option>
      <option value="desc">High to Low</option>
    </select>
  </div>

  <div class="hotels-container" id="hotelsContainer"></div>

  <script>
    let hotels = [];

    async function fetchHotels() {
      try {
        const res = await fetch("http://localhost:3000/api/hotels");
        hotels = await res.json();

        populateCityFilter();
        applyFilters();

      } catch (err) {
        console.error("Error fetching hotels:", err);
      }
    }

    function populateCityFilter() {
      const cities = [...new Set(hotels.map(h => h.city))];

      const citySelect = document.getElementById("cityFilter");

      citySelect.innerHTML =
        '<option value="">All Cities</option>';

      cities.forEach(city => {
        const option = document.createElement("option");
        option.value = city;
        option.textContent = city;
        citySelect.appendChild(option);
      });
    }

    function applyFilters() {
      const searchValue =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

      const cityValue =
        document.getElementById("cityFilter").value;

      const sortValue =
        document.getElementById("sortFilter").value;

      let filtered = hotels.filter(hotel =>
        hotel.name.toLowerCase().includes(searchValue) &&
        (cityValue === "" || hotel.city === cityValue)
      );

      if (sortValue === "asc") {
        filtered.sort((a, b) => a.price - b.price);
      }

      if (sortValue === "desc") {
        filtered.sort((a, b) => b.price - a.price);
      }

      displayHotels(filtered);
    }

    function displayHotels(data) {
      const container =
        document.getElementById("hotelsContainer");

      container.innerHTML = "";

      data.forEach(hotel => {
        const card = document.createElement("div");

        card.className = "hotel-card";

        card.innerHTML = `
          <img src="${hotel.image_url}" alt="${hotel.name}" />

          <div class="hotel-details">

            <h3>${hotel.name}</h3>

            <p>📍 ${hotel.city}</p>

            <p>${hotel.description}</p>

            <p>⭐ ${hotel.rating}</p>

            <p class="price">₹${Number(hotel.price).toLocaleString("en-IN")} / night</p>

            <a
              class="book-btn"
              href="booking.html?hotelId=${hotel.id}"
            >
              Book Now
            </a>

          </div>
        `;

        container.appendChild(card);
      });
    }

    fetchHotels();
  </script>

</body>
</html>
