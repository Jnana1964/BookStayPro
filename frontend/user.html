<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to Your Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-image: url('https://images.unsplash.com/photo-1529908639716-87e9c7c8a1cf?auto=format&fit=crop&w=1400&q=80');
      background-size: cover;
      background-position: center;
      color: white;
    }

    .container {
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
    }

    h1 {
      text-align: center;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    select, input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .hotels {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .hotel-card {
      background-color: white;
      color: black;
      border-radius: 10px;
      width: 250px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px #000;
    }

    .hotel-card img {
      width: 100%;
      height: 160px;
      border-radius: 8px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Your Dashboard</h1>

    <div class="filters">
      <input type="text" id="nameSearch" placeholder="Search by hotel name">
      <select id="locationFilter">
        <option value="">All Locations</option>
      </select>
      <select id="sortOrder">
        <option value="">Sort By</option>
        <option value="asc">A-Z</option>
        <option value="desc">Z-A</option>
      </select>
    </div>

    <div class="hotels" id="hotelList"></div>
  </div>

  <script>
    let hotels = [];

    async function fetchHotels() {
      const res = await fetch('/api/hotels');
      hotels = await res.json();
      populateLocations();
      renderHotels(hotels);
    }

    function populateLocations() {
      const locations = [...new Set(hotels.map(h => h.location))];
      const filter = document.getElementById('locationFilter');
      locations.forEach(loc => {
        const opt = document.createElement('option');
        opt.value = loc;
        opt.innerText = loc;
        filter.appendChild(opt);
      });
    }

    function renderHotels(hotelList) {
      const container = document.getElementById('hotelList');
      container.innerHTML = '';
      hotelList.forEach(hotel => {
        const card = document.createElement('div');
        card.className = 'hotel-card';
        card.innerHTML = `
          <img src="${hotel.image_url}" alt="${hotel.name}" />
          <h3>${hotel.name}</h3>
          <p>${hotel.location}</p>
          <button onclick="bookNow(${hotel.id})">Book Now</button>
        `;
        container.appendChild(card);
      });
    }

    function applyFilters() {
      let filtered = [...hotels];
      const name = document.getElementById('nameSearch').value.toLowerCase();
      const location = document.getElementById('locationFilter').value;
      const sort = document.getElementById('sortOrder').value;

      if (name) {
        filtered = filtered.filter(h => h.name.toLowerCase().includes(name));
      }

      if (location) {
        filtered = filtered.filter(h => h.location === location);
      }

      if (sort === 'asc') {
        filtered.sort((a, b) => a.name.localeCompare(b.name));
      } else if (sort === 'desc') {
        filtered.sort((a, b) => b.name.localeCompare(a.name));
      }

      renderHotels(filtered);
    }

    document.getElementById('nameSearch').addEventListener('input', applyFilters);
    document.getElementById('locationFilter').addEventListener('change', applyFilters);
    document.getElementById('sortOrder').addEventListener('change', applyFilters);

    function bookNow(hotelId) {
      window.location.href = `booking.html?hotelId=${hotelId}`;
    }

    fetchHotels();
  </script>
</body>
</html>
