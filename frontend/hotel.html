<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookStayPro | Register Hotel</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Register New Hotel</h1>

    <div style="display:flex; gap:12px;">
      <a class="book-btn" href="home.html">Hotels</a>
      <a class="book-btn" href="admin.html">Admin</a>
    </div>
  </header>

  <div class="form-container">
    <h2>Hotel Registration</h2>

    <form id="hotelForm">
      <label>Hotel Name</label>
      <input type="text" id="name" required />

      <label>Address</label>
      <input type="text" id="address" required />

      <label>City</label>
      <input type="text" id="city" required />

      <label>Description</label>
      <textarea id="description" rows="4" required></textarea>

      <label>Image URL</label>
      <input type="url" id="image_url" required />

      <label>Rating</label>
      <input type="number" id="rating" step="0.1" min="1" max="5" required />

      <label>Price Per Night</label>
      <input type="number" id="price" required />

      <button type="submit">Register Hotel</button>
    </form>

    <p id="response"></p>
  </div>

  <script>
    document.getElementById("hotelForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        address: document.getElementById("address").value,
        city: document.getElementById("city").value,
        description: document.getElementById("description").value,
        image_url: document.getElementById("image_url").value,
        rating: document.getElementById("rating").value,
        price: document.getElementById("price").value
      };

      try {
        const res = await fetch("http://localhost:3000/api/hotels", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        document.getElementById("response").textContent =
          result.message || "Hotel registered successfully";

        if (res.ok) {
          document.getElementById("hotelForm").reset();
        }

      } catch (error) {
        document.getElementById("response").textContent =
          "Hotel registration failed";
      }
    });
  </script>
</body>
</html>
