<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookStayPro | Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Admin Dashboard</h1>

    <div style="display:flex; gap:12px;">
      <a class="book-btn" href="home.html">Hotels</a>
      <a class="book-btn" href="hotel.html">Add Hotel</a>
      <a class="book-btn" href="profile.html">Bookings</a>
      <a class="book-btn" href="index.html">Logout</a>
    </div>
  </header>

  <div class="container" style="max-width:1200px; margin:40px auto; padding:32px;">
    <h2>All Hotels</h2>
    <table id="hotelsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Hotel</th>
          <th>City</th>
          <th>Rating</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>All Bookings</h2>
    <table id="bookingsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Email</th>
          <th>Hotel</th>
          <th>City</th>
          <th>Check-In</th>
          <th>Check-Out</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function loadHotels() {
      const res = await fetch("http://localhost:3000/api/hotels");
      const hotels = await res.json();

      const tbody = document.querySelector("#hotelsTable tbody");
      tbody.innerHTML = "";

      hotels.forEach(hotel => {
        tbody.innerHTML += `
          <tr>
            <td>${hotel.id}</td>
            <td>${hotel.name}</td>
            <td>${hotel.city}</td>
            <td>${hotel.rating}</td>
            <td>₹${hotel.price}</td>
          </tr>
        `;
      });
    }

    async function loadBookings() {
      const res = await fetch("http://localhost:3000/api/bookings");
      const bookings = await res.json();

      const tbody = document.querySelector("#bookingsTable tbody");
      tbody.innerHTML = "";

      bookings.forEach(booking => {
        tbody.innerHTML += `
          <tr>
            <td>${booking.id}</td>
            <td>${booking.user_name}</td>
            <td>${booking.user_email}</td>
            <td>${booking.hotel_name}</td>
            <td>${booking.city}</td>
            <td>${booking.check_in}</td>
            <td>${booking.check_out}</td>
            <td>${booking.status}</td>
          </tr>
        `;
      });
    }

    loadHotels();
    loadBookings();
  </script>
</body>
</html>
