<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to BookStayPro</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('https://images.unsplash.com/photo-1501117716987-c8e29f8efb52?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .overlay {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 80px 30px;
      text-align: center;
      height: 100vh;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }
    p {
      font-size: 24px;
      margin-bottom: 40px;
    }
    a {
      text-decoration: none;
      color: white;
      background-color: #ff6600;
      padding: 15px 30px;
      border-radius: 8px;
      font-size: 18px;
      transition: background 0.3s ease;
    }
    a:hover {
      background-color: #cc5200;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>BookStayPro</h1>
    <p>Your Gateway to Luxurious Stays</p>
    <a href="login.html">Login Now</a>
  </div>
</body>
</html>
