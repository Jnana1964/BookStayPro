<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookStayPro | Book Hotel</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container" style="max-width: 820px; margin: 60px auto; padding: 36px;">
    <h1 style="text-align:center; margin-bottom:24px;">Complete Your Booking</h1>

    <div class="selected-hotel" id="selectedHotelBox" style="margin-bottom:24px;">
      Loading selected hotel...
    </div>

    <form id="bookingForm">
      <h2>Booking Details</h2>

      <label>Select Hotel</label>
      <select id="hotelId" required></select>

      <label>User ID</label>
      <input type="number" id="userId" placeholder="Enter logged-in user ID" required />

      <label>Check-in Date</label>
      <input type="date" id="checkIn" required />

      <label>Check-out Date</label>
      <input type="date" id="checkOut" required />

      <button type="submit">Confirm Booking</button>
    </form>

    <a href="home.html" style="display:block;text-align:center;margin-top:20px;color:#d4a017;">
      ← Back to Hotels
    </a>
  </div>

  <script>
    let hotels = [];

    async function fetchHotels() {
      try {
        const res = await fetch("http://localhost:3000/api/hotels");
        hotels = await res.json();

        const hotelSelect = document.getElementById("hotelId");
        const selectedHotelBox = document.getElementById("selectedHotelBox");

        const urlParams = new URLSearchParams(window.location.search);
        const selectedHotelId = urlParams.get("hotelId");

        hotelSelect.innerHTML = "";

        hotels.forEach((hotel) => {
          const option = document.createElement("option");
          option.value = hotel.id;
          option.textContent = `${hotel.name} - ${hotel.city} - ₹${hotel.price}`;

          if (String(hotel.id) === String(selectedHotelId)) {
            option.selected = true;
          }

          hotelSelect.appendChild(option);
        });

        const selectedHotel = hotels.find(
          (hotel) => String(hotel.id) === String(selectedHotelId)
        );

        if (selectedHotel) {
          selectedHotelBox.innerHTML = `
            <h2>${selectedHotel.name}</h2>
            <p>📍 ${selectedHotel.city}</p>
            <p>⭐ ${selectedHotel.rating}</p>
            <p class="price">₹${selectedHotel.price} per night</p>
          `;
        } else {
          selectedHotelBox.innerHTML = "<p>Please select a hotel.</p>";
        }

      } catch (error) {
        console.error("Failed to load hotels:", error);
        alert("Failed to load hotels");
      }
    }

    document.getElementById("bookingForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const bookingData = {
        user_id: document.getElementById("userId").value,
        hotel_id: document.getElementById("hotelId").value,
        check_in: document.getElementById("checkIn").value,
        check_out: document.getElementById("checkOut").value
      };

      try {
        const res = await fetch("http://localhost:3000/api/bookings", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(bookingData)
        });

        const data = await res.json();

        if (res.ok) {
          alert("Booking Successful!");
          window.location.href = "profile.html";
        } else {
          alert("Booking Failed: " + data.message);
        }

      } catch (error) {
        console.error(error);
        alert("Booking Failed: Network Error");
      }
    });

    fetchHotels();
  </script>
</body>
</html>
